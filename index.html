<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 글로벌 8대 자산 터미널 (Real Data)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg: #f4f6f8; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: #2d3436; padding: 20px; }
        
        .header-main { max-width: 1400px; margin: 0 auto 30px; text-align: left; }
        .header-main h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .header-main p { color: #636e72; margin-top: 5px; font-weight: 500; }

        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: 0 auto; 
        }

        /* 🚨 형님! 여기 height를 350px -> 480px로 훌쩍 늘렸습니다! */
        .asset-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid #e1e5ee; display: flex; flex-direction: column; height: 480px; }
        
        .asset-header { margin-bottom: 10px; }
        .asset-title { font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; gap: 6px; }
        .asset-sub { font-size: 0.8rem; color: #b2bec3; font-weight: 600; margin-left: 5px; }

        .tradingview-widget-container { height: 100%; width: 100%; flex-grow: 1; }

        @media (min-width: 1200px) { .dashboard-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <div class="header-main">
        <h1>Global <span>Macro</span> Terminal</h1>
        <p>전 세계 8대 주요 자산 100% 실제 데이터 (TradingView API - 외부 연동 허용 심볼 적용)</p>
    </div>

    <div class="dashboard-grid">
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">🇺🇸 NASDAQ 100</div></div>
            <div class="tradingview-widget-container"><div id="tv_nasdaq" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">🇺🇸 S&P 500 <span class="asset-sub"></span></div></div>
            <div class="tradingview-widget-container"><div id="tv_sp500" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">🇰🇷 KOSPI <span class="asset-sub">(EWY ETF)</span></div></div>
            <div class="tradingview-widget-container"><div id="tv_kospi" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">₿ BITCOIN</div></div>
            <div class="tradingview-widget-container"><div id="tv_btc" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">📀 GOLD</div></div>
            <div class="tradingview-widget-container"><div id="tv_gold" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">🧱 COPPER <span class="asset-sub">(CPER ETF)</span></div></div>
            <div class="tradingview-widget-container"><div id="tv_copper" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">🛢️ CRUDE OIL</div></div>
            <div class="tradingview-widget-container"><div id="tv_oil" style="height: 100%;"></div></div>
        </div>
        <div class="asset-card">
            <div class="asset-header"><div class="asset-title">🔥 NATURAL GAS <span class="asset-sub">(UNG ETF)</span></div></div>
            <div class="tradingview-widget-container"><div id="tv_gas" style="height: 100%;"></div></div>
        </div>
    </div>

    <script type="text/javascript">
        function createWidget(symbol, containerId) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",           
                "timezone": "Asia/Seoul",  
                "theme": "light",          
                "style": "1",              
                "locale": "kr",            
                "enable_publishing": false,
                "hide_top_toolbar": false, 
                "hide_legend": true,       
                "save_image": false,
                "container_id": containerId
            });
        }

        window.onload = function() {
            createWidget("CAPITALCOM:US100", "tv_nasdaq"); 
            createWidget("CAPITALCOM:US500", "tv_sp500");  
            createWidget("AMEX:EWY", "tv_kospi");          
            createWidget("BINANCE:BTCUSD", "tv_btc");      
            createWidget("TVC:GOLD", "tv_gold");           
            createWidget("AMEX:CPER", "tv_copper");        
            createWidget("TVC:USOIL", "tv_oil");           
            createWidget("AMEX:UNG", "tv_gas");            
        };
    </script>
</body>
</html>
