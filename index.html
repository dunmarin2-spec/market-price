<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 NASDAQ 100 멀티 차트</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --up: #d63031; --down: #0984e3; --bg: #ffffff; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: #333; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); padding: 25px; border: 1px solid #eee; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.5rem; font-weight: 900; }

        /* 버튼 그룹 (틱/일/월 선택) */
        .btn-group { display: flex; gap: 8px; background: #f1f2f6; padding: 5px; border-radius: 12px; }
        .btn-group button { 
            border: none; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer;
            background: transparent; color: #636e72; transition: 0.2s;
        }
        .btn-group button.active { background: white; color: var(--up); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }

        #chart-box { height: 450px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🇺🇸 NASDAQ 100 <span>지수</span></h1>
            <div class="btn-group">
                <button onclick="changeTimeframe('tick')" id="btn-tick">틱봉</button>
                <button onclick="changeTimeframe('day')" id="btn-day" class="active">일봉</button>
                <button onclick="changeTimeframe('month')" id="btn-month">월봉</button>
            </div>
        </div>

        <div id="chart-box"></div>
    </div>

    <script>
        const chartBox = document.getElementById('chart-box');
        
        // 1. 차트 엔진 초기화
        const chart = LightweightCharts.createChart(chartBox, {
            layout: { backgroundColor: '#ffffff', textColor: '#333' },
            grid: { vertLines: { color: '#f5f5f5' }, horzLines: { color: '#f5f5f5' } },
            timeScale: { borderColor: '#eee', timeVisible: true, secondsVisible: false },
        });

        // 2. 한국식 빨강/파랑 캔들 설정
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#d63031', downColor: '#0984e3',
            borderUpColor: '#d63031', borderDownColor: '#0984e3',
            wickUpColor: '#d63031', wickDownColor: '#0984e3',
        });

        // 3. 데이터셋 (틱봉, 일봉, 월봉 시뮬레이션 데이터)
        const tickData = [
            { time: 1711270000, open: 18240, high: 18245, low: 18238, close: 18242 },
            { time: 1711270100, open: 18242, high: 18248, low: 18240, close: 18247 },
            { time: 1711270200, open: 18247, high: 18247, low: 18235, close: 18236 },
            { time: 1711270300, open: 18236, high: 18242, low: 18236, close: 18241 },
            { time: 1711270400, open: 18241, high: 18241, low: 18230, close: 18232 },
        ];

        const dayData = [
            { time: '2026-03-18', open: 17800, high: 18100, low: 17750, close: 18050 },
            { time: '2026-03-19', open: 18050, high: 18200, low: 17900, close: 18150 },
            { time: '2026-03-20', open: 18150, high: 18180, low: 17850, close: 17920 },
            { time: '2026-03-23', open: 17920, high: 18100, low: 17800, close: 18080 },
            { time: '2026-03-24', open: 18080, high: 18300, low: 18050, close: 18245 },
        ];

        const monthData = [
            { time: '2025-11-01', open: 15500, high: 16200, low: 15400, close: 16100 },
            { time: '2025-12-01', open: 16100, high: 17000, low: 16000, close: 16900 },
            { time: '2026-01-01', open: 16900, high: 17500, low: 16700, close: 17400 },
            { time: '2026-02-01', open: 17400, high: 18200, low: 17300, close: 18100 },
            { time: '2026-03-01', open: 18100, high: 18450, low: 17800, close: 18245 },
        ];

        // 4. 타임프레임 변경 로직
        function changeTimeframe(type) {
            // 버튼 디자인 변경
            document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');

            // 데이터 교체
            if (type === 'tick') candleSeries.setData(tickData);
            if (type === 'day') candleSeries.setData(dayData);
            if (type === 'month') candleSeries.setData(monthData);

            // 차트 뷰 최적화 (자동 맞춤)
            chart.timeScale().fitContent();
        }

        // 초기 실행 (일봉)
        changeTimeframe('day');

        // 창 크기 대응
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartBox.clientWidth });
        });
    </script>
</body>
</html>
